<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de Archivos | DevResources</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#030712',
                        secondary: '#00aae8',
                        accent: '#0ea5e9',
                        dark: '#020617',
                        light: '#f8fafc'
                    }
                }
            }
        }
    </script>
    <style>
        .gradient-text {
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            background-image: linear-gradient(90deg, #00aae8, #0ea5e9);
        }
    </style>
</head>
<body class="bg-primary text-gray-100 font-sans antialiased">
    <!-- Navbar -->
    <nav class="bg-gray-900/50 border-b border-gray-800">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-8 h-8 text-secondary">
                    <path fill-rule="evenodd" d="M14.615 1.595a.75.75 0 01.359.852L12.982 9.75h7.268a.75.75 0 01.548 1.262l-10.5 11.25a.75.75 0 01-1.272-.71l1.992-7.302H3.75a.75.75 0 01-.548-1.262l10.5-11.25a.75.75 0 01.913-.143z" clip-rule="evenodd" />
                </svg>
                <div class="flex flex-col leading-tight">
                    <span class="text-2xl font-bold bg-gradient-to-r from-secondary to-cyan-400 bg-clip-text text-transparent">DevResources</span>
                    <span class="text-xs text-white opacity-80">by Rodrigo Paz</span>
                </div>
            </div>
            
            <div class="flex items-center space-x-4">
                <!-- <span class="text-sm text-gray-400">Modo consulta</span> -->
                <button id="logout-btn" class="px-4 py-2 bg-gray-800 rounded-lg text-sm hover:bg-gray-700 transition-colors">
                    Cerrar sesión
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container mx-auto px-6 py-8">
       <!-- Welcome Banner -->
<div class="bg-gradient-to-r from-gray-900 to-primary rounded-2xl p-6 mb-8 border border-gray-800 relative overflow-hidden">
    <div class="absolute -right-20 -top-20 w-64 h-64 rounded-full bg-secondary opacity-10 blur-xl"></div>
    <div class="absolute -left-20 -bottom-20 w-80 h-80 rounded-full bg-cyan-500 opacity-10 blur-xl"></div>
    
    <div class="relative z-10">
        <h1 class="text-3xl md:text-4xl font-bold mb-2">Hola, <span id="welcome-username" class="gradient-text">Usuario</span></h1>
        <p class="text-lg text-gray-400">Tienes <span class="text-secondary font-medium" id="resource-count">0</span> recursos disponibles</p>
        
        <!-- Estadísticas rápidas -->
        <div class="flex flex-wrap gap-4 mt-4">
            <div class="bg-gray-800/50 px-4 py-2 rounded-lg border border-gray-700">
                <p class="text-sm text-gray-400">PDFs</p>
                <p class="text-lg font-semibold" id="pdf-count">0</p>
            </div>
            <div class="bg-gray-800/50 px-4 py-2 rounded-lg border border-gray-700">
                <p class="text-sm text-gray-400">Videos</p>
                <p class="text-lg font-semibold" id="video-count">0</p>
            </div>
            <div class="bg-gray-800/50 px-4 py-2 rounded-lg border border-gray-700">
                <p class="text-sm text-gray-400">Códigos</p>
                <p class="text-lg font-semibold" id="code-count">0</p>
            </div>
        </div>
    </div>
</div>
        
        <!-- Search and Filter -->
        <div class="bg-gray-900/50 rounded-xl p-6 mb-8 border border-gray-800">
            <div class="flex flex-col md:flex-row gap-4">
                <div class="flex-1 relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </div>
                    <input type="text" id="search-input" class="w-full pl-10 pr-4 py-3 bg-gray-800 border border-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-secondary focus:border-transparent" placeholder="Buscar recursos...">
                </div>
                
                <select id="filter-type" class="px-4 py-3 bg-gray-800 border border-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-secondary focus:border-transparent">
                    <option value="all">Todos los tipos</option>
                    <option value="pdf">PDF</option>
                    <option value="video">Video</option>
                    <option value="code">Código</option>
                </select>
                
                <select id="filter-date" class="px-4 py-3 bg-gray-800 border border-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-secondary focus:border-transparent">
                    <option value="newest">Más recientes primero</option>
                    <option value="oldest">Más antiguos primero</option>
                </select>
            </div>
        </div>
        
        <!-- Resources Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="resources-container">
            <!-- Los recursos se cargarán aquí dinámicamente -->
        </div>
        
        <!-- Empty State -->
        <div id="empty-state" class="text-center py-12 hidden">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mx-auto text-gray-500 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <h3 class="text-xl font-medium text-gray-300 mb-2">No se encontraron recursos</h3>
            <p class="text-gray-500">Prueba ajustando los filtros de búsqueda</p>
        </div>
    </main>

    <!-- Resource Detail Modal -->
    <div id="detail-modal" class="fixed inset-0 bg-black/70 z-50 flex items-center justify-center hidden">
        <div class="bg-gray-900/90 backdrop-blur-sm rounded-xl p-8 max-w-4xl w-full mx-4 border border-gray-800 relative max-h-[90vh] overflow-y-auto">
            <button id="close-detail" class="absolute top-4 right-4 text-gray-400 hover:text-white">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-6 h-6">
                    <path d="M6.28 5.22a.75.75 0 00-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 101.06 1.06L10 11.06l3.72 3.72a.75.75 0 101.06-1.06L11.06 10l3.72-3.72a.75.75 0 00-1.06-1.06L10 8.94 6.28 5.22z" />
                </svg>
            </button>
            
            <div id="modal-content">
                <!-- El contenido del recurso se cargará aquí -->
            </div>
        </div>
    </div>

    <script type="module">
        // Importaciones de Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { 
            getAuth, 
            onAuthStateChanged,
            signOut 
        } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
    
        // Configuración de Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyC-rqf8SPy8GSo6WoMPJThTwUH7DfU6-3k",
            authDomain: "devresources-7ce8b.firebaseapp.com",
            projectId: "devresources-7ce8b",
            storageBucket: "devresources-7ce8b.appspot.com",
            messagingSenderId: "223004107680",
            appId: "1:223004107680:web:d22c39c7bfaae7910dfac5",
            measurementId: "G-7332067SNG"
        };
    
        // Inicialización
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

         // Datos de ejemplo (en un caso real vendrían de una API)
         const resources = [
            {
                id: 1,
                title: "Guía de Tailwind CSS",
                description: "Manual completo con todos los componentes y utilidades de Tailwind CSS v3.0",
                type: "pdf",
                date: "2023-05-15",
                size: "2.4 MB",
                url: "#",
                preview: "Contenido de ejemplo del PDF..."
            },
            {
                id: 2,
                title: "Tutorial de React Hooks",
                description: "Video tutorial que explica los hooks más usados en React",
                type: "video",
                date: "2023-04-28",
                duration: "15:24",
                url: "#",
                preview: "Contenido de ejemplo del video..."
            },
            {
                id: 3,
                title: "Ejemplos de autenticación",
                description: "Código de ejemplo para implementar JWT en Node.js",
                type: "code",
                date: "2023-04-10",
                language: "JavaScript",
                url: "#",
                preview: "// Código de ejemplo\nconst jwt = require('jsonwebtoken');\n\nfunction generateToken(user) {\n  return jwt.sign({ id: user.id }, process.env.JWT_SECRET, { expiresIn: '1h' });\n}"
            }
        ];

        // Mostrar recursos en el grid
        function renderResources(filteredResources = resources) {
            const container = document.getElementById('resources-container');
            const emptyState = document.getElementById('empty-state');
            
            container.innerHTML = '';
            
            if(filteredResources.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            }
            
            emptyState.classList.add('hidden');
            
            filteredResources.forEach(resource => {
                const resourceCard = document.createElement('div');
                resourceCard.className = 'bg-gray-900/80 rounded-xl overflow-hidden border border-gray-800 hover:border-secondary transition-colors cursor-pointer';
                resourceCard.innerHTML = `
                    <div class="h-48 ${getResourceBg(resource.type)} flex items-center justify-center relative">
                        ${getResourceIcon(resource.type)}
                        ${resource.type === 'video' ? '<div class="absolute bottom-4 right-4 bg-black/70 text-white text-xs px-2 py-1 rounded">'+resource.duration+'</div>' : ''}
                    </div>
                    <div class="p-6">
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="font-bold text-lg">${resource.title}</h3>
                            <span class="text-xs bg-gray-800 ${getResourceColor(resource.type)} px-2 py-1 rounded">${getResourceTypeName(resource.type)}</span>
                        </div>
                        <p class="text-gray-400 text-sm mb-4">${resource.description}</p>
                        <div class="flex justify-between items-center">
                            <span class="text-xs text-gray-500">${formatDate(resource.date)}</span>
                            <button class="text-sm text-secondary hover:underline view-detail" data-id="${resource.id}">
                                Ver detalles
                            </button>
                        </div>
                    </div>
                `;
                container.appendChild(resourceCard);
            });
            
            // Agregar event listeners a los botones de detalle
            document.querySelectorAll('.view-detail').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const resourceId = parseInt(btn.getAttribute('data-id'));
                    showResourceDetail(resourceId);
                });
            });
            
            // Agregar event listener a las tarjetas para abrir detalle
            document.querySelectorAll('#resources-container > div').forEach(card => {
                card.addEventListener('click', (e) => {
                    if(!e.target.classList.contains('view-detail')) {
                        const resourceId = parseInt(card.querySelector('.view-detail').getAttribute('data-id'));
                        showResourceDetail(resourceId);
                    }
                });
            });
        }
        
        // Funciones auxiliares para recursos
        function getResourceBg(type) {
            return {
                'pdf': 'bg-gradient-to-r from-cyan-900/30 to-secondary/30',
                'video': 'bg-gradient-to-r from-purple-900/30 to-pink-500/30',
                'code': 'bg-gradient-to-r from-green-900/30 to-emerald-500/30'
            }[type];
        }
        
        function getResourceIcon(type) {
            const icons = {
                'pdf': `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-16 h-16 text-secondary">
                          <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
                       </svg>`,
                'video': `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-16 h-16 text-pink-500">
                            <path stroke-linecap="round" d="M15.75 10.5l4.72-4.72a.75.75 0 011.28.53v11.38a.75.75 0 01-1.28.53l-4.72-4.72M4.5 18.75h9a2.25 2.25 0 002.25-2.25v-9a2.25 2.25 0 00-2.25-2.25h-9A2.25 2.25 0 002.25 7.5v9a2.25 2.25 0 002.25 2.25z" />
                         </svg>`,
                'code': `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-16 h-16 text-emerald-500">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M17.25 6.75L22.5 12l-5.25 5.25m-10.5 0L1.5 12l5.25-5.25m7.5-3l-4.5 16.5" />
                         </svg>`
            };
            return icons[type];
        }
        
        function getResourceColor(type) {
            return {
                'pdf': 'text-secondary',
                'video': 'text-pink-500',
                'code': 'text-emerald-500'
            }[type];
        }
        
        function getResourceTypeName(type) {
            return {
                'pdf': 'PDF',
                'video': 'Video',
                'code': 'Código'
            }[type];
        }
        
        function formatDate(dateString) {
            const options = { year: 'numeric', month: 'short', day: 'numeric' };
            return new Date(dateString).toLocaleDateString('es-ES', options);
        }
        
        // Mostrar detalle del recurso
        function showResourceDetail(resourceId) {
            const resource = resources.find(r => r.id === resourceId);
            if(!resource) return;
            
            const modal = document.getElementById('detail-modal');
            const content = document.getElementById('modal-content');
            
            content.innerHTML = `
                <h2 class="text-2xl font-bold mb-4">${resource.title}</h2>
                <div class="flex flex-wrap gap-2 mb-6">
                    <span class="text-xs ${getResourceColor(resource.type)} bg-gray-800 px-2 py-1 rounded">${getResourceTypeName(resource.type)}</span>
                    <span class="text-xs text-gray-400 bg-gray-800 px-2 py-1 rounded">${formatDate(resource.date)}</span>
                    ${resource.size ? `<span class="text-xs text-gray-400 bg-gray-800 px-2 py-1 rounded">${resource.size}</span>` : ''}
                    ${resource.duration ? `<span class="text-xs text-gray-400 bg-gray-800 px-2 py-1 rounded">${resource.duration}</span>` : ''}
                    ${resource.language ? `<span class="text-xs text-gray-400 bg-gray-800 px-2 py-1 rounded">${resource.language}</span>` : ''}
                </div>
                
                <p class="text-gray-300 mb-6">${resource.description}</p>
                
                <div class="bg-gray-800 rounded-lg p-4 mb-6">
                    <h3 class="font-medium text-gray-300 mb-2">Vista previa:</h3>
                    <div class="text-gray-400 text-sm whitespace-pre-line">${resource.preview}</div>
                </div>
                
                <div class="flex justify-end">
                    <a href="${resource.url}" class="px-4 py-2 bg-secondary rounded-lg text-white hover:bg-cyan-500 transition-colors flex items-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                        </svg>
                        Descargar
                    </a>
                </div>
            `;
            
            modal.classList.remove('hidden');
        }
        
        // Filtrar recursos
        function filterResources() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const typeFilter = document.getElementById('filter-type').value;
            const dateFilter = document.getElementById('filter-date').value;
            
            let filtered = resources.filter(resource => {
                const matchesSearch = resource.title.toLowerCase().includes(searchTerm) || 
                                     resource.description.toLowerCase().includes(searchTerm);
                const matchesType = typeFilter === 'all' || resource.type === typeFilter;
                return matchesSearch && matchesType;
            });
            
            if(dateFilter === 'newest') {
                filtered.sort((a, b) => new Date(b.date) - new Date(a.date));
            } else {
                filtered.sort((a, b) => new Date(a.date) - new Date(b.date));
            }
            
            renderResources(filtered);
        }
        
        // Event listeners
        document.getElementById('search-input').addEventListener('input', filterResources);
        document.getElementById('filter-type').addEventListener('change', filterResources);
        document.getElementById('filter-date').addEventListener('change', filterResources);
        
        document.getElementById('close-detail').addEventListener('click', () => {
            document.getElementById('detail-modal').classList.add('hidden');
        });
        
        // Inicializar
        renderResources();

        // Actualizar el banner de bienvenida
        function updateWelcomeBanner(resources) {
        
        // Contar recursos por tipo
        const pdfCount = resources.filter(r => r.type === 'pdf').length;
        const videoCount = resources.filter(r => r.type === 'video').length;
        const codeCount = resources.filter(r => r.type === 'code').length;
        
        // Actualizar estadísticas
        document.getElementById('resource-count').textContent = resources.length;
        document.getElementById('pdf-count').textContent = pdfCount;
        document.getElementById('video-count').textContent = videoCount;
        document.getElementById('code-count').textContent = codeCount;
        }

        // Llamar la función con tus datos (ejemplo)
        updateWelcomeBanner(resources);                 // Array de recursos que ya tienes definido

        // Verificación de autenticación
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = 'registro.html';
            } else {
                document.getElementById('welcome-username').textContent = user.displayName || 'Usuario';
                
                // Configurar botón de logout
                document.getElementById('logout-btn').addEventListener('click', () => {
                    signOut(auth)
                        .then(() => {
                            window.location.href = 'registro.html';
                        })
                        .catch((error) => {
                            console.error('Error al cerrar sesión:', error);
                        });
                });

                // Inicializar la UI
                renderResources();
                updateWelcomeBanner(resources);
            }
        });

        // Event listeners
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('search-input').addEventListener('input', filterResources);
            document.getElementById('filter-type').addEventListener('change', filterResources);
            document.getElementById('filter-date').addEventListener('change', filterResources);
            document.getElementById('close-detail').addEventListener('click', () => {
                document.getElementById('detail-modal').classList.add('hidden');
            });
        });
    </script>
       
</body>
</html>
